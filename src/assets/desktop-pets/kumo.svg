<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Kumo cloud dragon">
  <defs>
    <linearGradient id="kumo-body" x1=".15" y1=".05" x2=".84" y2=".95">
      <stop offset="0" stop-color="#fff9dc"/>
      <stop offset=".55" stop-color="#ffe8bd"/>
      <stop offset="1" stop-color="#f7cfa9"/>
