name: Release

# Release pipeline — triggers when a `v*` tag lands on the repo. Two stages:
#   1) build matrix (macOS + Windows) only builds bundles and uploads them as
#      workflow artifacts. tauri-action runs with no `tagName`, so it does NOT
#      try to create / update a GitHub release itself.
#   2) publish job downloads all artifacts and creates a single, published
#      (not draft) release via softprops/action-gh-release. The body is a fixed
#      "Downloads" intro followed by a commit changelog generated with
#      `changelogithub` (zero-config: it groups the repo's lowercase conventional
#      commits — feat / fix / perf — into the release notes).
#
# Use `npm run release` locally to bump the version in package.json /
# tauri.conf.json / Cargo.toml, commit, tag, and push in one go; the pushed
# tag fires this workflow. `workflow_dispatch` is left in for emergency
# re-runs from the Actions UI — when triggered manually (no tag) only the
# build job runs; the publish job is skipped via the `if: tag` guard.
#
# Tauri cross-compile from macOS to a Windows installer isn't practical
# locally because NSIS/WiX bundling needs a Windows toolchain, so the
# Windows artifacts are produced on a `windows-latest` runner here. Linux
# bundles (.deb / .AppImage) come from an `ubuntu-22.04` runner; we pin
# 22.04 instead of `ubuntu-latest` so the resulting binary links against
# an older glibc and runs on a wider range of distros.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Multiple tag pushes on the same ref shouldn't fight over the release.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both targets; harmless to list on Windows
          # because the action only installs targets it recognizes for the host.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        # Tauri 2 on Linux needs webkit2gtk-4.1 + glib/gtk dev headers; the rest
        # (patchelf, libxdo, librsvg) are used by the .deb / .AppImage bundlers.
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            file

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        # No `tagName` here on purpose — without it, tauri-action only builds
        # and never touches the GitHub release. The `publish` job handles that.
        with:
          args: ${{ matrix.args }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v5
        with:
          name: bundle-${{ matrix.platform }}
          # macOS universal builds land under `target/universal-apple-darwin/release/bundle/`;
          # Windows + Linux builds land under `target/release/bundle/`. Glob covers all.
          # Linux: .deb (Debian/Ubuntu) + .AppImage (portable). We don't ship .rpm —
          # rpmbuild isn't preinstalled on ubuntu-22.04 and adding it slows the job
          # without serving a clear audience; AppImage covers RPM-based distros too.
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*-setup.exe
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
          if-no-files-found: error

  publish:
    needs: build
    # Only publish for tag pushes. `workflow_dispatch` runs build-only.
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      # Full history (fetch-depth: 0) so changelogithub can diff against the
      # previous v* tag and list every commit in between.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Download all bundles
        uses: actions/download-artifact@v5
        with:
          pattern: bundle-*
          path: dist
          merge-multiple: true

      # Generate the commit changelog grouped by conventional type. Zero-config:
      # changelogithub's defaults group lowercase `feat:` / `fix:` / `perf:`
      # commits (enforced by commitlint). `--output` writes the markdown to a
      # file instead of creating the release itself, so action-gh-release stays
      # the single source of the release (body + assets) and we control ordering.
      - name: Generate commit changelog
        run: npx -y changelogithub --output CHANGELOG_NOTES.md --to "${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Downloads section on top (preserves the previous layout), then the
      # generated commit changelog below it.
      - name: Assemble release notes
        run: |
          cat > RELEASE_BODY.md <<'EOF'
          ## Downloads

          - **macOS (Apple Silicon + Intel)** — `cc-sessions-viewer_*_universal.dmg`
          - **Windows x64** — `cc-sessions-viewer_*_x64-setup.exe` / `*_x64_en-US.msi`
          - **Linux x86_64** — `cc-sessions-viewer_*_amd64.deb` (Debian/Ubuntu) / `cc-sessions-viewer_*_amd64.AppImage` (portable)

          On macOS first launch the unsigned `.app` may prompt — right-click → **Open** to bypass Gatekeeper.
          On Linux the `.AppImage` needs `chmod +x` before running; the `.deb` installs with `sudo apt install ./cc-sessions-viewer_*_amd64.deb`.

          Full version history → [`CHANGELOG.md`](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          EOF
          printf '\n---\n\n' >> RELEASE_BODY.md
          cat CHANGELOG_NOTES.md >> RELEASE_BODY.md

      # Aggregated "Contributors" footer. changelogithub already credits each
      # author inline (`by @login`); this adds a deduped @mention list for the
      # whole release range via the GitHub compare API (author.login resolves to
      # a clickable handle when the commit email maps to a GitHub account, else
      # the plain git name). Base = previous v* tag, or the root commit for the
      # very first release. Skipped silently if the list comes back empty.
      - name: Append contributors
        run: |
          TAG="${{ github.ref_name }}"
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [ -z "$PREV" ]; then PREV="$(git rev-list --max-parents=0 HEAD | tail -1)"; fi
          CONTRIBUTORS="$(curl -fsS \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/compare/${PREV}...${TAG}?per_page=250" \
            | jq -r '[.commits[] | (if .author.login then "@" + .author.login else .commit.author.name end)] | unique | join(", ")')"
          if [ -n "$CONTRIBUTORS" ] && [ "$CONTRIBUTORS" != "null" ]; then
            printf '\n### ❤️ Contributors\n\nThanks to %s\n' "$CONTRIBUTORS" >> RELEASE_BODY.md
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # Published, not draft — set draft: true if you want to review on
          # GitHub before users see it.
          draft: false
          prerelease: false
          # Body is fully supplied via body_path (Downloads + commit changelog),
          # so don't let GitHub append its PR-based "What's Changed" section too.
          generate_release_notes: false
          body_path: RELEASE_BODY.md
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
