name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build / publish (e.g. vX.Y.Z)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            file

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: Strip bundled libwayland-client from AppImage
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          APPIMAGE=$(find src-tauri/target -name '*.AppImage' -type f | head -1)
          [ -z "$APPIMAGE" ] && { echo "No AppImage found, skipping"; exit 0; }
          chmod +x "$APPIMAGE"
          # Extract, remove the conflicting lib, repack
          "$APPIMAGE" --appimage-extract
          rm -f squashfs-root/usr/lib/libwayland-client.so*
          # Download appimagetool if not present
          curl -fsSL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*-setup.exe
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.sig
            src-tauri/target/**/release/bundle/**/latest.json
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: dist
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Merge updater manifests
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const root = 'dist'
          const manifests = []

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name)
              if (entry.isDirectory()) {
                walk(full)
              } else if (entry.name === 'latest.json') {
                manifests.push(full)
              }
            }
          }

          walk(root)
          if (!manifests.length) {
            throw new Error('No updater latest.json files found in downloaded artifacts')
          }

          let merged = null
          for (const file of manifests) {
            const json = JSON.parse(fs.readFileSync(file, 'utf8'))
            if (!json.version || !json.platforms || typeof json.platforms !== 'object') {
              throw new Error(`Invalid updater manifest: ${file}`)
            }
            if (!merged) {
              merged = {
                version: json.version,
                notes: json.notes,
                pub_date: json.pub_date,
                platforms: {},
              }
            } else if (merged.version !== json.version) {
              throw new Error(`Updater manifest version mismatch: ${merged.version} vs ${json.version} in ${file}`)
            }
            Object.assign(merged.platforms, json.platforms)
          }

          const required = ['windows-x86_64', 'linux-x86_64']
          for (const platform of required) {
            if (!merged.platforms[platform]) {
              throw new Error(`Merged updater manifest is missing ${platform}`)
            }
          }
          if (!merged.platforms['darwin-x86_64'] && !merged.platforms['darwin-aarch64']) {
            throw new Error('Merged updater manifest is missing macOS platforms')
          }

          for (const file of manifests) {
            fs.rmSync(file, { force: true })
          }
          fs.writeFileSync(path.join(root, 'latest.json'), `${JSON.stringify(merged, null, 2)}\n`)
          console.log(`Merged ${manifests.length} updater manifests into dist/latest.json`)
          console.log(`Platforms: ${Object.keys(merged.platforms).sort().join(', ')}`)
          NODE

      - name: Generate release notes
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
