name: Release

# Build + publish pipeline. Two ways to fire:
#
#   1) Automatically, via `release-please.yml` — when a release PR merges,
#      release-please updates CHANGELOG.md + bumps versions on the merge
#      commit, then this workflow is called with the new tag (workflow_call).
#      That path skips the GITHUB_TOKEN tag-push limitation: the tag created
#      by release-please's GITHUB_TOKEN normally wouldn't trigger downstream
#      workflows, so we chain via `workflow_call` from release-please.yml
#      instead of listening for tag pushes.
#
#   2) Manually, via the Actions UI ("Run workflow"). Supply the tag name
#      (e.g. `v0.1.3`) and the workflow builds + publishes against that
#      tag — useful for re-publishing a release or recovering from a botched run.
#
# Stages:
#   - build matrix (macOS + Windows + Linux) only builds bundles and uploads
#     them as workflow artifacts. tauri-action runs with no `tagName`, so it
#     does NOT try to create / update a GitHub release itself.
#   - publish job downloads all artifacts and creates a single, published
#     (not draft) release via softprops/action-gh-release. The body is a
#     fixed "Downloads" intro followed by the matching `## [X.Y.Z]` section
#     extracted from CHANGELOG.md (which release-please already wrote on the
#     same commit as the tag) + a deduped contributors footer.
#
# Tauri cross-compile from macOS to a Windows installer isn't practical
# locally because NSIS/WiX bundling needs a Windows toolchain, so Windows
# artifacts are produced on a `windows-latest` runner. Linux bundles
# (.deb / .AppImage) come from `ubuntu-22.04` (not `ubuntu-latest`) so
# binaries link against an older glibc and run on a wider range of distros.
on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to build / publish (e.g. v0.1.3)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build / publish (e.g. v0.1.3)'
        required: true
        type: string

permissions:
  contents: write

# One publish per tag; concurrent runs on the same tag should not fight.
concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Checkout the tag release-please just created (or the one the
          # operator typed into workflow_dispatch). `inputs.tag` is the same
          # string in both paths.
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both targets; harmless to list on Windows
          # because the action only installs targets it recognizes for the host.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        # Tauri 2 on Linux needs webkit2gtk-4.1 + glib/gtk dev headers; the rest
        # (patchelf, libxdo, librsvg) are used by the .deb / .AppImage bundlers.
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            file

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        # No `tagName` here on purpose — without it, tauri-action only builds
        # and never touches the GitHub release. The `publish` job handles that.
        with:
          args: ${{ matrix.args }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v5
        with:
          name: bundle-${{ matrix.platform }}
          # macOS universal builds land under `target/universal-apple-darwin/release/bundle/`;
          # Windows + Linux builds land under `target/release/bundle/`. Glob covers all.
          # Linux: .deb (Debian/Ubuntu) + .AppImage (portable). We don't ship .rpm —
          # rpmbuild isn't preinstalled on ubuntu-22.04 and adding it slows the job
          # without serving a clear audience; AppImage covers RPM-based distros too.
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*-setup.exe
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Full history (fetch-depth: 0) so the contributors compare-API call
      # below has both endpoints of `PREV..TAG` available locally.
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Download all bundles
        uses: actions/download-artifact@v5
        with:
          pattern: bundle-*
          path: dist
          merge-multiple: true

      # Extract the matching `## [X.Y.Z]` section from CHANGELOG.md (release-please
      # writes that section on the same commit as the tag, so by the time we get
      # here it's already in the tree). awk captures from the header line down
      # to — but not including — the next `## [` header.
      #
      # The expected heading shape is release-please's default:
      #   ## [0.1.3](https://.../compare/v0.1.2...v0.1.3) (2026-06-01)
      # We strip the leading `v` from the tag (v0.1.3 → 0.1.3) to match.
      - name: Extract release notes from CHANGELOG.md
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          awk -v v="${VERSION}" '
            $0 ~ ("^## \\[" v "\\]") { capture=1; print; next }
            capture && /^## \[/        { exit }
            capture                    { print }
          ' CHANGELOG.md > CHANGELOG_NOTES.md
          if [ ! -s CHANGELOG_NOTES.md ]; then
            echo "::warning::No CHANGELOG.md section found for ${VERSION}; using empty body."
          fi

      # Downloads section on top (preserves the previous layout), then the
      # changelog section extracted from CHANGELOG.md below it.
      - name: Assemble release notes
        run: |
          cat > RELEASE_BODY.md <<'EOF'
          ## Downloads

          - **macOS (Apple Silicon + Intel)** — `cc-sessions-viewer_*_universal.dmg`
          - **Windows x64** — `cc-sessions-viewer_*_x64-setup.exe` / `*_x64_en-US.msi`
          - **Linux x86_64** — `cc-sessions-viewer_*_amd64.deb` (Debian/Ubuntu) / `cc-sessions-viewer_*_amd64.AppImage` (portable)

          On macOS first launch the unsigned `.app` may prompt — right-click → **Open** to bypass Gatekeeper.
          On Linux the `.AppImage` needs `chmod +x` before running; the `.deb` installs with `sudo apt install ./cc-sessions-viewer_*_amd64.deb`.

          Full version history → [`CHANGELOG.md`](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          EOF
          printf '\n---\n\n' >> RELEASE_BODY.md
          cat CHANGELOG_NOTES.md >> RELEASE_BODY.md

      # Aggregated "Contributors" footer. Pulls a deduped @mention list for
      # the whole release range from the GitHub compare API (author.login
      # resolves to a clickable handle when the commit email maps to a GitHub
      # account, else the plain git name). Base = previous v* tag, or the
      # root commit for the very first release. Skipped silently if empty.
      - name: Append contributors
        run: |
          TAG="${{ inputs.tag }}"
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [ -z "$PREV" ]; then PREV="$(git rev-list --max-parents=0 HEAD | tail -1)"; fi
          CONTRIBUTORS="$(curl -fsS \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/compare/${PREV}...${TAG}?per_page=250" \
            | jq -r '[.commits[] | (if .author.login then "@" + .author.login else .commit.author.name end)] | unique | join(", ")')"
          if [ -n "$CONTRIBUTORS" ] && [ "$CONTRIBUTORS" != "null" ]; then
            printf '\n### ❤️ Contributors\n\nThanks to %s\n' "$CONTRIBUTORS" >> RELEASE_BODY.md
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          # Published, not draft — set draft: true if you want to review on
          # GitHub before users see it.
          draft: false
          prerelease: false
          # Body is fully supplied via body_path (Downloads + CHANGELOG section),
          # so don't let GitHub append its PR-based "What's Changed" section too.
          generate_release_notes: false
          body_path: RELEASE_BODY.md
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
