name: Release

# Release pipeline — triggers when a `v*` tag lands on the repo.
# Use `npm run release` locally (see package.json) to bump the version in
# package.json / tauri.conf.json / Cargo.toml, commit, tag, and push in one
# go; the pushed tag fires this workflow. `workflow_dispatch` is left in
# for emergency re-runs from the Actions UI.
#
# Tauri cross-compile from macOS to a Windows installer isn't practical
# locally because NSIS/WiX bundling needs a Windows toolchain, so the
# Windows artifacts are produced on a `windows-latest` runner here.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both targets; harmless to list on Windows
          # because the action only installs targets it recognizes for the host.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # When the workflow is triggered by a tag, tauri-action publishes a
          # draft GitHub release with the bundles attached. For workflow_dispatch
          # they just become job artifacts via the upload step below.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload bundle artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*-setup.exe
          if-no-files-found: warn
